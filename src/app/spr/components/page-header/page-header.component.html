<div class="spr-page-header">

  <div class="header-left">
    <div class="ge-logo">
      <svg width="36" height="36" viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="50" r="48" stroke="#1a6db5" stroke-width="4" fill="white"/>
        <text x="50" y="62" text-anchor="middle" font-size="38" font-weight="bold" fill="#1a6db5" font-family="serif">GE</text>
      </svg>
    </div>
    <div class="ge-vernova-text">GE VERNOVA</div>
  </div>

  <div class="header-center">
    <div class="report-title">SUPPLIER PROGRESS REPORT</div>
    <div class="page-title">{{ pageTitle }}</div>
  </div>

  <div class="header-right">
    <div class="sisu-logo">
      <span class="sisu-text">SISU</span>
      <div class="sisu-sub">ENERGY &amp; ENVIRONMENTAL</div>
    </div>
    <div class="spr-version-box">
      <div class="version-title">SPR Version</div>
      <table class="version-table">
        <tr><td class="vl">Rev. No:</td><td class="vv">{{ header.revNo }}</td></tr>
        <tr><td class="vl">Reference:</td><td class="vv">{{ header.reference }}</td></tr>
        <tr><td class="vl">Date:</td><td class="vv">{{ header.date }}</td></tr>
      </table>
    </div>
  </div>

</div>
